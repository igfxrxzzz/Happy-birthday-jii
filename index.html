<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Still Yours ЁЯТМ</title>
<style>
  :root { --primary: #ff4d6d; --text: #333; }
  body {
    margin:0; padding:0; background: #ffffff; color: var(--text); 
    font-family: 'Segoe UI', Roboto, sans-serif; text-align:center; 
    overflow-x:hidden; user-select: none; min-height: 100vh;
  }
  .box { margin-top: 50px; padding: 20px; animation: fadeIn 0.5s ease-in; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  h1, h2 { color: var(--primary); font-weight: 700; }
  
  input {
    padding: 14px; border-radius: 30px; border: 2px solid #eee; 
    outline: none; margin-bottom: 10px; text-align: center; width: 240px; 
    font-size: 16px; transition: 0.3s; background: #f9f9f9;
  }
  input:focus { border-color: var(--primary); background: #fff; }

  button {
    padding: 14px 30px; font-size: 16px; border: none; border-radius: 30px; 
    background: var(--primary); color: white; cursor: pointer; margin: 10px; 
    transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
    box-shadow: 0 4px 15px rgba(255, 77, 109, 0.3); font-weight: 600;
  }
  button:active { transform: scale(0.95); }
  .hidden { display: none; }

  /* 1. Catch the Heart - Pro Speed */
  #game-catch-container { 
    position: relative; width: 95%; max-width: 400px; height: 450px; 
    background: #fdfdfd; border-radius: 20px; border: 2px solid #f0f0f0;
    margin: 20px auto; overflow: hidden; touch-action: none;
  }
  #basket { position: absolute; bottom: 15px; left: 50%; font-size: 55px; transform: translateX(-50%); z-index: 10; transition: left 0.05s linear; }
  .falling-heart { position: absolute; font-size: 35px; z-index: 5; will-change: transform; }

  /* 2. Memory Flip - Springy 3D */
  .memory-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; max-width: 350px; margin: 20px auto; perspective: 1200px; }
  .card { 
    width: 100px; height: 100px; cursor: pointer; position: relative; 
    transform-style: preserve-3d; transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .card.flipped { transform: rotateY(180deg); }
  .card-front, .card-back {
    position: absolute; width: 100%; height: 100%; backface-visibility: hidden;
    display: flex; align-items: center; justify-content: center; border-radius: 18px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.05); border: 1px solid #eee;
  }
  .card-front { background: #fff; color: var(--primary); font-size: 40px; }
  .card-back { background: var(--primary); color: white; font-size: 40px; transform: rotateY(180deg); }

  /* 3. Maze Smooth */
  #maze-container { position: relative; width: 300px; height: 300px; background: #fff; margin: 20px auto; border: 4px solid #f0f0f0; border-radius: 15px; }
  .maze-wall { position: absolute; background: #eee; border-radius: 10px; }
  #player { position: absolute; width: 32px; height: 32px; background: var(--primary); border-radius: 50%; top: 5px; left: 5px; z-index: 10; box-shadow: 0 4px 10px rgba(255, 77, 109, 0.4); }

  /* Final Envelope */
  .envelope-wrapper { position: relative; width: 300px; height: 180px; background: var(--primary); margin: 50px auto; cursor: pointer; border-radius: 0 0 15px 15px; }
  .envelope-wrapper:before { content: ""; position: absolute; top: 0; left: 0; border-left: 150px solid transparent; border-right: 150px solid transparent; border-top: 100px solid #ff758c; z-index: 5; transition: 0.5s; transform-origin: top; }
  .envelope-wrapper.open:before { transform: rotateX(180deg); z-index: 0; }
  .letter { position: absolute; bottom: 5px; left: 10px; width: 280px; height: 160px; background: white; padding: 25px; box-sizing: border-box; transition: 0.7s; z-index: 2; border-radius: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
  .envelope-wrapper.open .letter { transform: translateY(-130px); height: 220px; }
</style>
</head>
<body>

<div class="box">
  <div id="password-screen">
    <h1>Security Check ЁЯФТ</h1>
    <input type="password" id="passInput" placeholder="Enter Password...">
    <br><button onclick="checkPassword()">Unlock</button>
  </div>

  <div id="question-box" class="hidden">
    <p id="qtext" style="font-size: 22px; font-weight: bold;"></p>
    <div id="options"></div>
  </div>

  <div id="game-catch" class="hidden">
    <h1>Catch 10 Hearts тЭдя╕П</h1>
    <h2 id="catch-score">0 / 10</h2>
    <div id="game-catch-container">
        <div id="basket">ЁЯз║</div>
    </div>
  </div>

  <div id="game-memory" class="hidden">
    <h1>Memory Match ЁЯзй</h1>
    <div class="memory-grid" id="memory-grid"></div>
  </div>

  <div id="game-maze" class="hidden">
    <h1>Reach the Cake ЁЯОВ</h1>
    <div id="maze-container">
        <div id="player"></div>
        <div id="goal" style="position:absolute; bottom:10px; right:10px; font-size:35px;">ЁЯОВ</div>
        <div class="maze-wall" style="top:80px; left:0; width:220px; height:15px;"></div>
        <div class="maze-wall" style="top:180px; right:0; width:220px; height:15px;"></div>
    </div>
  </div>

  <div id="final-screen" class="hidden">
    <h1>Happy Birthday ЁЯдН</h1>
    <div class="envelope-wrapper" id="envelope" onclick="openEnvelope()">
      <div class="letter">
        <h3 style="color: var(--primary); margin: 0 0 10px 0;">My Message ЁЯТМ</h3>
        <p style="font-size: 15px; line-height: 1.6;">my jigarтАж You mean the world to me. I cherish us. <br><br><b>Still yoursтАж forever. ЁЯФе</b></p>
      </div>
    </div>
  </div>
</div>

<audio id="bgmusic" loop><source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg"></audio>

<script>
let quizData = [
  { q: "Guess who is sending you this surprise? ЁЯШП", options: ["Your love", "Someone else", "Only me", "Forever yours", "A Stranger ЁЯС╗"], answer: "Forever yours" },
  { q: "How much do you miss me right now? ЁЯТЦ", options: ["A lot", "Just a little", "Can't wait to see you", "Forever", "Not at all ЁЯШЬ"], answer: "A lot" },
  { q: "Ready for a big hug? тЬи", options: ["Yes!", "Absolutely", "Only you", "Forever mine", "No thanks тЭМ"], answer: "Yes!" }
];
let qIdx = 0;

function checkPassword() {
  if(document.getElementById('passInput').value.toLowerCase().trim() === "still yours") {
    document.getElementById('password-screen').classList.add('hidden');
    document.getElementById('question-box').classList.remove('hidden');
    document.getElementById('bgmusic').play();
    showQuestion();
  }
}

function showQuestion(){
  let q = quizData[qIdx];
  document.getElementById('qtext').innerText = q.q;
  let opts = document.getElementById('options'); opts.innerHTML = "";
  q.options.forEach(opt => {
    let btn = document.createElement('button'); btn.innerText = opt;
    btn.onclick = () => {
      if(opt === q.answer) { 
        qIdx++; 
        if(qIdx < 3) showQuestion(); 
        else { document.getElementById('question-box').classList.add('hidden'); startCatch(); }
      }
    };
    opts.appendChild(btn);
  });
}

// CATCH GAME - SUPER FAST
let cScore = 0; let cActive = false;
function startCatch() {
  document.getElementById('game-catch').classList.remove('hidden');
  cActive = true;
  const basket = document.getElementById('basket');
  const container = document.getElementById('game-catch-container');
  
  const move = (e) => {
    let rect = container.getBoundingClientRect();
    let x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
    if(x > 30 && x < container.clientWidth - 30) basket.style.left = x + 'px';
  };
  container.addEventListener('mousemove', move);
  container.addEventListener('touchmove', move);

  let heartDrop = setInterval(() => {
    if(!cActive) { clearInterval(heartDrop); return; }
    const h = document.createElement('div');
    h.className = 'falling-heart'; h.innerText = 'тЭдя╕П';
    h.style.left = Math.random() * (container.clientWidth - 40) + 'px';
    h.style.top = '-50px'; container.appendChild(h);

    let fall = setInterval(() => {
      let top = parseInt(h.style.top);
      if(top > container.clientHeight - 85) {
        let bPos = basket.getBoundingClientRect();
        let hPos = h.getBoundingClientRect();
        if(hPos.left < bPos.right && hPos.right > bPos.left) {
          cScore++; document.getElementById('catch-score').innerText = `${cScore} / 10`;
          h.remove(); clearInterval(fall);
          if(cScore >= 10) { cActive=false; document.getElementById('game-catch').classList.add('hidden'); initMem(); }
        }
      }
      if(top > container.clientHeight) { h.remove(); clearInterval(fall); }
      h.style.top = (top + 10) + 'px'; // FASTEST SPEED
    }, 16);
  }, 500);
}

// MEMORY - BOUNCY 3D
function initMem() {
  document.getElementById('game-memory').classList.remove('hidden');
  let grid = document.getElementById('memory-grid');
  let items = ['ЁЯТЦ','ЁЯТЦ','ЁЯОБ','ЁЯОБ','ЁЯОВ','ЁЯОВ','ЁЯТО','ЁЯТО','ЁЯМ╣','ЁЯМ╣','тнР','тнР'].sort(()=>Math.random()-0.5);
  let flipped = []; let matched = 0;

  items.forEach(emoji => {
    let card = document.createElement('div'); card.className = 'card';
    card.innerHTML = `<div class="card-front">?</div><div class="card-back">${emoji}</div>`;
    card.onclick = () => {
      if(flipped.length < 2 && !card.classList.contains('flipped')) {
        card.classList.add('flipped'); flipped.push(card);
        if(flipped.length === 2) {
          setTimeout(() => {
            if(flipped[0].querySelector('.card-back').innerText === flipped[1].querySelector('.card-back').innerText) {
              matched++; if(matched === 6) { document.getElementById('game-memory').classList.add('hidden'); initMaze(); }
            } else { flipped.forEach(c => c.classList.remove('flipped')); }
            flipped = [];
          }, 600);
        }
      }
    };
    grid.appendChild(card);
  });
}

// MAZE
function initMaze() {
  document.getElementById('game-maze').classList.remove('hidden');
  const p = document.getElementById('player'); const m = document.getElementById('maze-container');
  const moveMaze = (e) => {
    let r = m.getBoundingClientRect();
    let x = (e.touches ? e.touches[0].clientX : e.clientX) - r.left - 15;
    let y = (e.touches ? e.touches[0].clientY : e.clientY) - r.top - 15;
    if(x > 0 && x < 270 && y > 0 && y < 270) {
      p.style.left = x + 'px'; p.style.top = y + 'px';
      let pr = p.getBoundingClientRect(), gr = document.getElementById('goal').getBoundingClientRect();
      if(!(pr.right < gr.left || pr.left > gr.right || pr.bottom < gr.top || pr.top > gr.bottom)) {
        document.getElementById('game-maze').classList.add('hidden');
        document.getElementById('final-screen').classList.remove('hidden');
      }
    }
  };
  p.onmousedown = p.ontouchstart = (e) => { e.preventDefault(); m.addEventListener('mousemove', moveMaze); m.addEventListener('touchmove', moveMaze); };
  window.onmouseup = window.ontouchend = () => { m.removeEventListener('mousemove', moveMaze); m.removeEventListener('touchmove', moveMaze); };
}

function openEnvelope() { document.getElementById('envelope').classList.add('open'); }
</script>
</body>
</html>
